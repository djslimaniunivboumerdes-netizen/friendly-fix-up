name = "gnl1z-sonatrach"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"
binding = "ASSETS"

[vars]
APP_NAME = "GNL1Z Asset Management"
APP_VERSION = "2.1.0"
APP_ENV = "production"

[env.production]
name = "gnl1z-sonatrach"

[build]
command = "npm run build"

[observability]
enabled = true