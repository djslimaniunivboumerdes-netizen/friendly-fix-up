# ================================================================
#  Cloudflare Workers configuration for GNL1Z
# ================================================================

name                   = "gnl1z-sonatrach"
main                   = "src/worker.ts"
compatibility_date     = "2024-09-23"
compatibility_flags    = ["nodejs_compat"]

[assets]
directory = "./dist"
binding   = "ASSETS"

[vars]
APP_NAME    = "GNL1Z Asset Management"
APP_VERSION = "2.1.1"
APP_ENV     = "production"

[env.production]
name = "gnl1z-sonatrach"

[env.production.vars]
APP_ENV = "production"

[env.staging]
name = "gnl1z-sonatrach-staging"

[env.staging.vars]
APP_ENV = "staging"

[build]
command = "npm run build"

[observability]
enabled = true
